# Remap prefix to Ctrl-A
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Easier to remember pane split
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload tmux.conf from tmux
bind r source-file ~/.tmux.conf

# Switch panes using Alt-arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Enable mouse usage
set -g mouse on

# Don't auto-rename my windows please..
set-option -g allow-rename off

# Smart pane switching with awareness of vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
	| grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\ select-pane -l

# Restore 'clear screen' in bash
bind C-l send-keys 'C-l'

# Resize panes by using keys
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Several useful settings, ensuring correct colors
# utf8 encoding and a larger history
# set -g utf8
# set-window-option -g utf8 on
# set -g default-terminal "xterm"
set -g history-limit 10000
set -sg escape-time 1

# Start windows and panes from index 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Statusbar setup
set-option -g status on
# set -g status-utf8 on
set -g status-interval 5
set -g status-justify centre

set-option -g status-bg colour233
set-option -g status-fg colour156
set-option -g status-attr dim

set -g status-left-length 70
set -g status-left '#(whoami)@#(hostname)'

set -g status-right-length 60
set -g status-right "#S • #I:#P • %a %d/%b/%Y • %H:%M"

# Window colors
set-window-option -g window-status-fg colour244
set-window-option -g window-status-bg colour15
set-window-option -g window-status-attr dim

set-window-option -g window-status-current-fg colour235
set-window-option -g window-status-current-bg colour15
set-window-option -g window-status-current-attr bright

